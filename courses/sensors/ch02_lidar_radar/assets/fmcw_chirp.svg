 <text x="180" y="210" style="font-size:24px">&#916;f</text>
 <text x="204" y="215" style="font-size:20px">auf</text>

 <path d="M550  96v33"  stroke="black" stroke-width="2" marker-end="url(#Arrow)" />
 <path d="M550 306v-33" stroke="black" stroke-width="2" marker-end="url(#Arrow)" />
 <text x="535" y="200" style="font-size:24px">&#916;f</text>
